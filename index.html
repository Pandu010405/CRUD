<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Aplikasi CRUD Data Pasien</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        form { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Input Data Pasien - dasboard</h2>
    <form id="patientForm">
        <input type="text" id="nama" placeholder="Nama Pasien" required>
        <input type="number" id="umur" placeholder="Umur" required>
        <input type="text" id="diagnosa" placeholder="Diagnosa" required>
        <button type="submit">Simpan Data</button>
    </form>

    <h2>Daftar Pasien</h2>
    <table id="patientTable">
        <thead>
            <tr>
                <th>Nama</th>
                <th>Umur</th>
                <th>Diagnosa</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const form = document.getElementById('patientForm');
        const tableBody = document.querySelector('#patientTable tbody');

        // Load data dari LocalStorage saat halaman dibuka
        let patients = JSON.parse(localStorage.getItem('patients')) || [];

        function renderTable() {
            tableBody.innerHTML = '';
            patients.forEach((p, index) => {
                const row = `<tr>
                    <td>${p.nama}</td>
                    <td>${p.umur}</td>
                    <td>${p.diagnosa}</td>
                    <td><button onclick="deletePatient(${index})">Hapus</button></td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newPatient = {
                nama: document.getElementById('nama').value,
                umur: document.getElementById('umur').value,
                diagnosa: document.getElementById('diagnosa').value
            };
            patients.push(newPatient);
            localStorage.setItem('patients', JSON.stringify(patients)); // Simpan ke LocalStorage [cite: 22]
            form.reset();
            renderTable();
        });

        window.deletePatient = (index) => {
            patients.splice(index, 1);
            localStorage.setItem('patients', JSON.stringify(patients));
            renderTable();
        };

        renderTable();
    </script>
</body>
</html>
