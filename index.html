<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi CRUD Data Pasien - Pandu</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #4CAF50; padding-bottom: 10px; }
        
        form { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 30px; background: #eef2f3; padding: 20px; border-radius: 8px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        
        .btn-save { background-color: #4CAF50; color: white; }
        .btn-save:hover { background-color: #45a049; }
        .btn-update { background-color: #3498db; color: white; }
        .btn-update:hover { background-color: #2980b9; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .actions { display: flex; gap: 5px; }
        .btn-edit { background-color: #f39c12; color: white; padding: 6px 12px; font-size: 12px; }
        .btn-delete { background-color: #e74c3c; color: white; padding: 6px 12px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Input Data Pasien</h2>
    <!-- Form Input -->
    <form id="patientForm">
        <input type="hidden" id="editIndex" value="-1">
        <input type="text" id="nama" placeholder="Nama Pasien" required>
        <input type="number" id="umur" placeholder="Umur" required>
        <input type="text" id="diagnosa" placeholder="Diagnosa" required>
        <button type="submit" id="submitBtn" class="btn-save">Simpan Data</button>
    </form>

    <h2>Daftar Pasien</h2>
    <table id="patientTable">
        <thead>
            <tr>
                <th>Nama</th>
                <th>Umur</th>
                <th>Diagnosa</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            <!-- Data akan muncul di sini -->
        </tbody>
    </table>
</div>

<script>
    const form = document.getElementById('patientForm');
    const tableBody = document.querySelector('#patientTable tbody');
    const submitBtn = document.getElementById('submitBtn');
    const editIndexField = document.getElementById('editIndex');

    // Load data dari LocalStorage
    let patients = JSON.parse(localStorage.getItem('patients')) || [];

    function renderTable() {
        tableBody.innerHTML = '';
        patients.forEach((p, index) => {
            const row = `<tr>
                <td>${p.nama}</td>
                <td>${p.umur}</td>
                <td>${p.diagnosa}</td>
                <td class="actions">
                    <button class="btn-edit" onclick="editPatient(${index})">Edit</button>
                    <button class="btn-delete" onclick="deletePatient(${index})">Hapus</button>
                </td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const nama = document.getElementById('nama').value;
        const umur = document.getElementById('umur').value;
        const diagnosa = document.getElementById('diagnosa').value;
        const editIndex = parseInt(editIndexField.value);

        if (editIndex === -1) {
            // Mode Tambah (Create)
            patients.push({ nama, umur, diagnosa });
        } else {
            // Mode Ubah (Update)
            patients[editIndex] = { nama, umur, diagnosa };
            // Kembalikan form ke mode awal
            editIndexField.value = "-1";
            submitBtn.textContent = "Simpan Data";
            submitBtn.className = "btn-save";
        }

        localStorage.setItem('patients', JSON.stringify(patients));
        form.reset();
        renderTable();
    });

    // Fungsi untuk memicu mode Edit
    window.editPatient = (index) => {
        const p = patients[index];
        document.getElementById('nama').value = p.nama;
        document.getElementById('umur').value = p.umur;
        document.getElementById('diagnosa').value = p.diagnosa;
        
        editIndexField.value = index; // Tandai index yang mau di-edit
        submitBtn.textContent = "Update Data";
        submitBtn.className = "btn-update";
        window.scrollTo(0, 0); // Scroll ke atas ke arah form
    };

    window.deletePatient = (index) => {
        if(confirm("Yakin ingin menghapus data ini?")) {
            patients.splice(index, 1);
            localStorage.setItem('patients', JSON.stringify(patients));
            renderTable();
        }
    };

    renderTable();
</script>

</body>
</html>
